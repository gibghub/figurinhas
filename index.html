<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Álbum Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-10" x-data="app()">

    <div x-show="modal.show" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50" x-cloak>
        <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-sm">
            <p class="text-gray-800 mb-6 font-medium" x-text="modal.message"></p>
            <div class="flex justify-end gap-3">
                <button @click="modal.show = false" class="px-4 py-2 bg-gray-200 rounded">Cancelar</button>
                <button @click="modal.confirmAction(); modal.show = false" class="px-4 py-2 bg-blue-600 text-white rounded">Confirmar</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto bg-white shadow-lg min-h-screen pb-10">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Meu Álbum</h1>
        </div>

        <div x-show="isScanning" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-4">
            <div id="reader" class="w-full max-w-sm bg-white rounded-lg overflow-hidden"></div>
            <button @click="stopScanner()" class="mt-4 bg-red-600 text-white px-6 py-2 rounded-full font-bold">Cancelar Leitura</button>
        </div>

        <div class="p-4 space-y-4">
            <div class="bg-gray-100 p-3 rounded border">
                <p class="text-xs font-bold text-gray-500 mb-2 uppercase">Cadastrar nova figurinha</p>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" x-model="novoCodigo" @input="buscarPorCodigo()" placeholder="Código (ex: BRA-10)" class="border p-2 rounded text-sm col-span-2 uppercase">
                    <input type="text" x-model="novoNome" list="listaNomes" placeholder="Jogador" class="border p-2 rounded text-sm col-span-2">
                    <input type="text" x-model="novoPais" list="listaPaises" placeholder="País" class="border p-2 rounded text-sm">
                    <input type="text" x-model="novoDono" list="listaDonos" placeholder="Dono" class="border p-2 rounded text-sm">
                </div>
                
                <datalist id="listaNomes"><template x-for="nome in nomesUnicos"><option :value="nome"></option></template></datalist>
                <datalist id="listaPaises"><template x-for="pais in paisesUnicos"><option :value="pais"></option></template></datalist>
                <datalist id="listaDonos"><template x-for="dono in donosUnicos"><option :value="dono"></option></template></datalist>

                <div class="flex gap-2 mt-2">
                    <button @click="cadastrar()" class="flex-1 bg-green-600 text-white p-2 rounded text-sm font-bold">Adicionar</button>
                    <button @click="startScanner()" class="bg-gray-800 text-white px-4 rounded text-sm">📷 Scan</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200" x-show="progressoDonos.length > 0">
                <h3 class="text-sm font-bold text-gray-700 uppercase mb-3 flex items-center gap-2">🏆 Evolução da Coleção</h3>
                <div class="space-y-4">
                    <template x-for="prog in progressoDonos" :key="prog.dono">
                        <div>
                            <div class="flex justify-between text-xs mb-1">
                                <span class="font-bold text-gray-800" x-text="'👤 ' + prog.dono"></span>
                                <span class="text-gray-600 font-semibold" x-text="'✅ ' + prog.obtidas + ' / ' + prog.total + ' (' + prog.pct + '%)'"></span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden border border-gray-300">
                                <div class="bg-gradient-to-r from-blue-500 to-green-500 h-2.5 rounded-full transition-all duration-700" :style="'width: ' + prog.pct + '%'"></div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 text-sm">
                <button @click="exportarAmigo()" class="bg-blue-500 text-white p-2 rounded">📤 Exportar Colega</button>
                <label class="bg-purple-600 text-white p-2 rounded text-center cursor-pointer">
                    📥 Importar Base
                    <input type="file" @change="importar($event)" class="hidden" accept=".json">
                </label>
                <button @click="gerarPDF()" class="bg-rose-600 hover:bg-rose-700 text-white p-2 rounded font-bold shadow-sm transition">📄 Exportar Relatório PDF</button>
                <button @click="limparTudo()" class="bg-red-600 text-white p-2 rounded">🗑️ Limpar Tudo</button>
            </div>

            <div class="space-y-2 bg-gray-50 p-2 rounded border">
                <input type="text" x-model="filtroBusca" placeholder="🔍 Buscar Jogador, Código ou País..." class="w-full border p-2 rounded text-sm">
                <input type="text" x-model="filtroPessoa" list="listaDonosFiltro" placeholder="👤 Filtrar Dono..." class="w-full border p-2 rounded text-sm">
                <datalist id="listaDonosFiltro">
                    <template x-for="dono in donosUnicos"><option :value="dono"></option></template>
                </datalist>
            </div>

            <div class="flex border-b text-xs">
                <button @click="viewMode = 'todos'" :class="viewMode === 'todos' ? 'border-b-2 border-blue-600 font-bold' : ''" class="flex-1 py-2">Todas</button>
                <button @click="viewMode = 'repetidas'" :class="viewMode === 'repetidas' ? 'border-b-2 border-red-600 font-bold' : ''" class="flex-1 py-2 text-red-600">Repetidas</button>
                <button @click="viewMode = 'preciso'" :class="viewMode === 'preciso' ? 'border-b-2 border-orange-600 font-bold' : ''" class="flex-1 py-2 text-orange-600">Preciso</button>
                <button @click="viewMode = 'match'" :class="viewMode === 'match' ? 'border-b-2 border-green-600 font-bold' : ''" class="flex-1 py-2 text-green-700">Oportunidades</button>
            </div>

            <ul class="space-y-2">
                <template x-if="viewMode === 'match'">
                    <template x-for="m in filteredMatches" :key="m.nome + m.quemTem + m.quemPrecisa">
                        <li class="border-b p-3 bg-green-50 border-green-200">
                            <p class="font-bold text-gray-800">
                                <span x-show="m.codigo" class="text-blue-600 mr-1" x-text="m.codigo + ' - '"></span>
                                <span x-text="m.nome + ' (' + m.pais + ')'"></span>
                            </p>
                            <div class="flex flex-col gap-2 mt-2 text-xs">
                                <div class="flex justify-between">
                                    <span class="bg-green-200 px-2 py-1 rounded">✅ <b x-text="m.quemTem"></b> tem sobrando</span>
                                    <span class="bg-red-200 px-2 py-1 rounded">❌ <b x-text="m.quemPrecisa"></b> precisa</span>
                                </div>
                                <button @click="adicionarOportunidade(m)" class="bg-blue-600 text-white py-2 rounded font-bold w-full hover:bg-blue-700 transition">
                                    Adicionar para <span x-text="m.quemPrecisa"></span>
                                </button>
                            </div>
                        </li>
                    </template>
                </template>

                <template x-if="viewMode !== 'match'">
                    <template x-for="item in listaExibida" :key="item.id + item.dono">
                        <li class="border-b p-3 flex justify-between items-center" :class="item.qtd === 0 ? 'bg-orange-50' : (item.qtd > 1 ? 'bg-green-50' : '')">
                            <div>
                                <p class="font-bold text-gray-800">
                                    <span x-show="item.codigo" class="text-blue-600 mr-1" x-text="item.codigo + ' - '"></span>
                                    <span x-text="item.nome"></span>
                                </p>
                                <p class="text-xs text-gray-500" x-text="item.pais + ' | Dono: ' + (item.dono || 'Sem Dono')"></p>
                                
                                <div x-show="viewMode === 'todos'" class="mt-2">
                                    <button @click="editarItem(item)" class="text-blue-600 text-xs font-bold">✏️ Editar</button>
                                    <button @click="deletar(item)" class="text-red-600 text-xs font-bold ml-3">🗑️ Excluir</button>
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-2" x-show="viewMode === 'todos'">
                                <button @click="confirmarQtd(item, -1)" class="bg-gray-200 px-3 py-1 rounded font-bold hover:bg-gray-300">-</button>
                                <span class="font-bold text-lg w-8 text-center" x-text="item.qtd"></span>
                                <button @click="confirmarQtd(item, 1)" class="bg-blue-600 text-white px-3 py-1 rounded font-bold hover:bg-blue-700">+</button>
                            </div>

                            <div x-show="viewMode === 'repetidas'">
                                <span class="font-bold text-lg text-green-700">Saldo: <span x-text="item.qtd - 1"></span></span>
                            </div>
                        </li>
                    </template>
                </template>
            </ul>
        </div>
    </div>

        function app() {
            return {
                figurinhas: JSON.parse(localStorage.getItem('figurinhas')) || [],
                filtroBusca: '', filtroPessoa: '', viewMode: 'todos',
                novoCodigo: '', novoNome: '', novoPais: '', novoDono: '',
                isScanning: false, html5QrCode: null,
                modal: { show: false, message: '', confirmAction: null },

                showModal(msg, action) { this.modal = { show: true, message: msg, confirmAction: action }; },
                
                get nomesUnicos() { return [...new Set(this.figurinhas.map(f => f.nome))].sort(); },
                get paisesUnicos() { return [...new Set(this.figurinhas.map(f => f.pais))].sort(); },
                get donosUnicos() { return [...new Set(this.figurinhas.map(f => f.dono))].sort(); },

                get progressoDonos() {
                    const totalDatabase = Object.keys(databaseCodigos).length;
                    if (totalDatabase === 0) return [];
                    const donosValidos = this.donosUnicos.filter(d => d && d !== 'Sem Dono');
                    return donosValidos.map(dono => {
                        const figurinhasDoDono = this.figurinhas.filter(f => f.dono.toLowerCase() === dono.toLowerCase() && f.qtd > 0);
                        const codigosAdquiridos = new Set();
                        figurinhasDoDono.forEach(f => {
                            const cod = f.codigo ? f.codigo.toUpperCase() : '';
                            if (databaseCodigos[cod]) codigosAdquiridos.add(cod);
                            else {
                                const foundCod = Object.keys(databaseCodigos).find(k => databaseCodigos[k].nome.toLowerCase() === f.nome.trim().toLowerCase());
                                if (foundCod) codigosAdquiridos.add(foundCod);
                            }
                        });
                        return { dono, obtidas: codigosAdquiridos.size, total: totalDatabase, pct: Math.round((codigosAdquiridos.size / totalDatabase) * 100) };
                    });
                },

                gerarPDF() {
                    const nome = prompt("Qual o dono para gerar o relatório PDF?");
                    if (!nome) return;
                    const nomeReal = this.donosUnicos.find(d => d.toLowerCase() === nome.toLowerCase());
                    if (!nomeReal) { this.showModal("Dono não encontrado.", () => {}); return; }
                    
                    const totalDatabase = Object.keys(databaseCodigos).length;
                    const figurinhasDoDono = this.figurinhas.filter(f => f.dono.toLowerCase() === nomeReal.toLowerCase() && f.qtd > 0);
                    const codigosAdquiridos = new Set();
                    figurinhasDoDono.forEach(f => {
                        const cod = f.codigo ? f.codigo.toUpperCase() : '';
                        if (databaseCodigos[cod]) codigosAdquiridos.add(cod);
                        else {
                            const foundCod = Object.keys(databaseCodigos).find(k => databaseCodigos[k].nome.toLowerCase() === f.nome.trim().toLowerCase());
                            if (foundCod) codigosAdquiridos.add(foundCod);
                        }
                    });

                    const dadosAgrupados = {};
                    let totalObtidas = 0;
                    Object.keys(databaseCodigos).forEach(codigo => {
                        const info = databaseCodigos[codigo];
                        const tem = codigosAdquiridos.has(codigo);
                        if(tem) totalObtidas++;
                        if (!dadosAgrupados[info.pais]) dadosAgrupados[info.pais] = { total: 0, obtidas: 0, lista: [] };
                        dadosAgrupados[info.pais].total++;
                        if (tem) dadosAgrupados[info.pais].obtidas++;
                        dadosAgrupados[info.pais].lista.push({ codigo, nome: info.nome, tem });
                    });

                    const containerPdf = document.createElement('div');
                    containerPdf.style.padding = '20px';
                    containerPdf.style.fontFamily = 'Arial, sans-serif';

                    let htmlPdf = `<div style="text-align: center; margin-bottom: 20px;"><h1 style="color: #2563eb;">Relatório de ${nomeReal}</h1><p>Total: ${totalObtidas}/${totalDatabase}</p></div>`;
                    Object.keys(dadosAgrupados).sort().forEach(pais => {
                        const g = dadosAgrupados[pais];
                        htmlPdf += `<div style="margin-bottom: 20px;"><h2 style="background: #f3f4f6; padding: 10px; border-left: 5px solid #2563eb; font-size: 16px;">${pais} (${g.obtidas}/${g.total})</h2><div style="display: flex; flex-wrap: wrap; width: 100%;">`;
                        g.lista.forEach(item => {
                            htmlPdf += `<div style="width: 50%; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; box-sizing: border-box; page-break-inside: avoid; break-inside: avoid; ${item.tem ? '' : 'color: #888;'}">${item.tem ? '✅' : '❗'} <b>${item.codigo}</b> | ${item.nome}</div>`;
                        });
                        htmlPdf += `</div></div>`;
                    });
                    containerPdf.innerHTML = htmlPdf;
                    html2pdf().set({ margin: 10, filename: `Relatorio_${nomeReal}.pdf`, image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(containerPdf).save();
                },

                listaExibida() {
                    if (this.viewMode === 'preciso') {
                        const donoAtivo = this.filtroPessoa.toLowerCase() || (this.donosUnicos.length > 0 ? this.donosUnicos[0].toLowerCase() : '');
                        if (!donoAtivo) return [];
                        const figurinhasDoDono = this.figurinhas.filter(f => f.dono.toLowerCase() === donoAtivo);
                        let listaPreciso = [];
                        Object.keys(databaseCodigos).forEach(cod => {
                            const info = databaseCodigos[cod];
                            const possui = figurinhasDoDono.find(f => (f.codigo === cod || f.nome.toLowerCase() === info.nome.toLowerCase()) && f.qtd > 0);
                            if (!possui) {
                                listaPreciso.push({ id: 'virtual-' + cod, codigo: cod, nome: info.nome, pais: info.pais, dono: donoAtivo, qtd: 0 });
                            }
                        });
                        return listaPreciso.filter(f => (f.codigo.toLowerCase().includes(this.filtroBusca.toLowerCase()) || f.nome.toLowerCase().includes(this.filtroBusca.toLowerCase()) || f.pais.toLowerCase().includes(this.filtroBusca.toLowerCase())));
                    }
                    return this.figurinhas.filter(f => {
                        const matchesSearch = ((f.codigo && f.codigo.toLowerCase().includes(this.filtroBusca.toLowerCase())) || f.nome.toLowerCase().includes(this.filtroBusca.toLowerCase()) || f.pais.toLowerCase().includes(this.filtroBusca.toLowerCase())) && (f.dono.toLowerCase().includes(this.filtroPessoa.toLowerCase()));
                        if (this.viewMode === 'todos') return matchesSearch;
                        if (this.viewMode === 'repetidas') return matchesSearch && f.qtd > 1;
                        return matchesSearch;
                    });
                },

                buscarPorCodigo() { if(!this.novoCodigo) return; const cod = this.novoCodigo.trim().toUpperCase(); if (databaseCodigos[cod]) { this.novoNome = databaseCodigos[cod].nome; this.novoPais = databaseCodigos[cod].pais; } },
                adicionarOuAtualizar(codigo, nome, pais, dono) { const d = dono || 'Sem Dono'; const existente = this.figurinhas.find(f => f.nome.toLowerCase() === nome.toLowerCase() && f.dono.toLowerCase() === d.toLowerCase()); if (existente) { existente.qtd++; if (codigo && !existente.codigo) existente.codigo = codigo.toUpperCase(); } else { this.figurinhas.push({ id: Date.now(), codigo: codigo ? codigo.toUpperCase() : '', nome, pais, dono: d, qtd: 1 }); } this.salvar(); },
                adicionarOportunidade(m) { const existente = this.figurinhas.find(f => f.nome.toLowerCase() === m.nome.toLowerCase() && f.dono.toLowerCase() === m.quemPrecisa.toLowerCase()); if (existente) { existente.qtd++; if (m.codigo && !existente.codigo) existente.codigo = m.codigo.toUpperCase(); } else { this.figurinhas.push({ id: Date.now(), codigo: m.codigo ? m.codigo.toUpperCase() : '', nome: m.nome, pais: m.pais, dono: m.quemPrecisa, qtd: 1 }); } const doador = this.figurinhas.find(f => f.nome.toLowerCase() === m.nome.toLowerCase() && f.dono.toLowerCase() === m.quemTem.toLowerCase()); if (doador && doador.qtd > 1) { doador.qtd--; } this.salvar(); this.showModal(`Sucesso! ${m.nome} transferida de ${m.quemTem} para ${m.quemPrecisa}!`, () => {}); },

cadastrar() {
    // 1. Validação básica
    if (!this.novoCodigo?.trim() || !this.novoNome?.trim() || !this.novoPais?.trim() || !this.novoDono?.trim()) {
        this.showModal("Atenção: Preencha todos os campos!", () => {});
        return;
    }

    // 2. Verifica se a figurinha já existe para o dono
    const nome = this.novoNome.trim();
    const dono = this.novoDono.trim();
    const existente = this.figurinhas.find(f => 
        f.nome.toLowerCase() === nome.toLowerCase() && 
        f.dono.toLowerCase() === dono.toLowerCase()
    );

    // 3. Calcula quantidades
    const qtdAtual = existente ? existente.qtd : 0;
    const novaQtd = qtdAtual + 1;

    // 4. Dispara o modal com a informação personalizada
    this.showModal(
        `Você já possui ${qtdAtual} unidade(s) de "${nome}" para o dono "${dono}". Deseja adicionar mais uma? O total passará a ser ${novaQtd}.`, 
        () => {
            // Ação caso confirme
            this.adicionarOuAtualizar(this.novoCodigo, this.novoNome, this.novoPais, this.novoDono);
            this.novoCodigo = '';
            this.novoNome = '';
            this.novoPais = '';
            // Mantemos o País e o Dono preenchidos para facilitar cadastros sequenciais
            this.showModal("Sucesso! Figurinha adicionada.", () => {});
        }
    );
},

                startScanner() { this.isScanning = true; this.html5QrCode = new Html5Qrcode("reader"); this.html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => { const partes = text.split(';'); if(partes.length >= 2) { let cod = '', nome = '', pais = ''; if (partes.length === 3) { cod = partes[0]; nome = partes[1]; pais = partes[2]; } else { nome = partes[0]; pais = partes[1]; } this.adicionarOuAtualizar(cod, nome, pais, this.novoDono); this.stopScanner(); } else this.showModal("QR inválido", () => {}); }).catch(err => { this.showModal("Erro: " + err, () => {}); this.isScanning = false; }); },
                stopScanner() { if (this.html5QrCode) this.html5QrCode.stop().then(() => { this.isScanning = false; }); },
                salvar() { localStorage.setItem('figurinhas', JSON.stringify(this.figurinhas)); },
                
                // Mudança 2: Confirmação de Qtd
                confirmarQtd(item, delta) {
                    const operacao = delta > 0 ? "adicionar" : "remover";
                    this.showModal(`Deseja ${operacao} uma unidade de ${item.nome}?`, () => {
                        item.qtd = Math.max(0, item.qtd + delta);
                        this.salvar();
                    });
                },

                deletar(item) { this.showModal("Tem certeza que deseja excluir esta figurinha?", () => { this.figurinhas = this.figurinhas.filter(f => f.id !== item.id); this.salvar(); }); },
                editarItem(item) {
                    const novoCodigo = prompt("Editar Código:", item.codigo || '');
                    if (novoCodigo === null) return;
                    let novoNome = item.nome;
                    let novoPais = item.pais;
                    const codUpper = novoCodigo.toUpperCase();
                    if (databaseCodigos[codUpper]) {
                        novoNome = databaseCodigos[codUpper].nome;
                        novoPais = databaseCodigos[codUpper].pais;
                    } else {
                        novoNome = prompt("Código não encontrado na base. Edite o Nome:", item.nome) || item.nome;
                        novoPais = prompt("Edite o País:", item.pais) || item.pais;
                    }
                    const novoDono = prompt("Editar Dono:", item.dono) || item.dono;
                    const jaExiste = this.figurinhas.some(f => f.dono.toLowerCase() === novoDono.toLowerCase() && f.nome.toLowerCase() === novoNome.toLowerCase() && f.id !== item.id);
                    if (jaExiste) { this.showModal("Erro: Esta figurinha já existe para este dono!", () => {}); return; }
                    item.codigo = codUpper;
                    item.nome = novoNome;
                    item.pais = novoPais;
                    item.dono = novoDono || 'Sem Dono';
                    this.salvar();
                },
                importar(event) { const reader = new FileReader(); reader.onload = (e) => { try { const novas = JSON.parse(e.target.result); const donoDoArquivo = novas[0].dono.trim(); let lista = this.figurinhas.filter(f => f.dono.trim().toLowerCase() !== donoDoArquivo.toLowerCase()); lista.push(...novas.map(i => ({...i, dono: donoDoArquivo}))); this.figurinhas = lista; this.salvar(); this.showModal("Importado com sucesso!", () => {}); } catch(err) { this.showModal("Erro ao importar.", () => {}); } }; reader.readAsText(event.target.files[0]); },
                exportarAmigo() { const nome = prompt("Nome do colega?"); if (!nome) return; const existe = this.figurinhas.some(f => f.dono.toLowerCase() === nome.toLowerCase()); if (!existe) { this.showModal("Dono não encontrado.", () => {}); return; } const dados = this.figurinhas.filter(f => f.dono.toLowerCase() === nome.toLowerCase()); const blob = new Blob([JSON.stringify(dados)], {type: "application/json"}); const dataHoje = new Date().toISOString().slice(0, 10); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Figurinhas_${nome}_${dataHoje}.json`; a.click(); },
                limparTudo() { this.showModal("Tem certeza que deseja apagar tudo?", () => { this.figurinhas = []; this.salvar(); }); },
                
                get filteredMatches() {
                    let matches = [];
                    const nomes = [...new Set(this.figurinhas.map(f => f.nome))];
                    const donos = [...new Set(this.figurinhas.map(f => f.dono))];
                    nomes.forEach(nome => {
                        const regs = this.figurinhas.filter(f => f.nome === nome);
                        const quemTem = regs.filter(f => f.qtd > 1);
                        quemTem.forEach(a => {
                            donos.forEach(d => {
                                if (d === a.dono) return;
                                if (!regs.find(f => f.dono === d) || regs.find(f => f.dono === d).qtd === 0) 
                                    matches.push({ codigo: a.codigo, nome: nome, pais: a.pais, quemTem: a.dono, quemPrecisa: d });
                            });
                        });
                    });
                    return matches.filter(m => (
                        (m.codigo && m.codigo.toLowerCase().includes(this.filtroBusca.toLowerCase())) || 
                        m.nome.toLowerCase().includes(this.filtroBusca.toLowerCase()) || 
                        m.pais.toLowerCase().includes(this.filtroBusca.toLowerCase())
                    ) && (m.quemTem.toLowerCase().includes(this.filtroPessoa.toLowerCase()) || m.quemPrecisa.toLowerCase().includes(this.filtroPessoa.toLowerCase())));
                }
            }
        }
